# Keyword-based triage rules for email classification.
# Edit this file to tune classification without touching code.
# All patterns are case-insensitive substring matching (no regex).
#
# Scoring: subject match = 3 points, body match = 1 point
# Confidence: 1 - e^(-0.23 * score)
#   1 subject match (3 pts) ≈ 0.50 MEDIUM
#   2 subject matches (6 pts) ≈ 0.75 MEDIUM
#   3 subject matches (9 pts) ≈ 0.87 HIGH
#   1 subject + 2 body (5 pts) ≈ 0.68 MEDIUM

version: 1

# ---------------------------------------------------------------------------
# RIGID RULES (High-Certainty Pre-Filter)
# ---------------------------------------------------------------------------
# These rules run FIRST before probabilistic keyword scoring.
# If ANY rule matches completely, email is classified as NO_ACTION_NEEDED
# with HIGH confidence and PRIO_LOW. No LLM classification needed.
#
# All conditions in a rule must match (AND logic):
# - sender_email_exact: exact sender address match
# - sender_domain: substring match (e.g., @eatplanted.com)
# - subject_starts_with: list of allowed subject prefixes (any match)
#
rigid_rules:
  # Calendar responses from @eatplanted.com employees (noise)
  - description: "Outlook calendar acceptance/tentative/decline"
    sender_domain: "@eatplanted.com"
    subject_starts_with:
      - "Accepted: "
      - "Tentative: "
      - "Declined: "

  # Jira notifications (generally no accounting action needed)
  - description: "Jira notification emails"
    sender_email_exact: "jira@eatplanted.atlassian.net"

  # Suspected phishing: .onmicrosoft.com is the default Microsoft 365 tenant
  # domain. Legitimate companies almost always use a custom domain.
  # External senders from *.onmicrosoft.com claiming to send invoices/bills
  # are a strong phishing signal.
  - description: "Sender from default .onmicrosoft.com tenant (suspected phishing)"
    sender_domain_ends_with: ".onmicrosoft.com"
    category: "SUSPECT_PHISHING"
    priority: "PRIO_HIGH"
    requires_manual_review: true

settings:
  high_confidence_threshold: 0.80
  medium_confidence_threshold: 0.50
  subject_weight: 3.0
  body_weight: 1.0
  attachment_weight: 1.5
  internal_domains:
    - "eatplanted.com"
    - "plantedfoods.ch"

